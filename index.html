<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--bg2:#161b24;--bg3:#1c2230;
  --border:#252d3a;--border2:#2e3847;
  --green:#00e87a;--blue:#29b6f6;--purple:#ce93d8;
  --yellow:#ffd54f;--orange:#ffb74d;--red:#ef5350;
  --white:#f0f4ff;--g1:#b0bec5;--g2:#78909c;--g3:#546e7a;--g4:#2e3847;
}
body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;font-size:14px;}

/* ── TOP NAV ── */
.nav{display:flex;background:#0a0e14;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.nav-uni{display:flex;flex:1;border-right:1px solid var(--border);}
.uni-btn{flex:1;padding:13px 6px;border:none;background:none;font-size:10px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .2s;color:var(--g3);border-bottom:2px solid transparent;font-family:inherit;}
.uni-btn.soft.active{color:var(--green);border-bottom-color:var(--green);}
.uni-btn.hard.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.nav-tabs{display:flex;flex:2;}
.tab-btn{flex:1;padding:13px 4px;border:none;background:none;color:var(--g3);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}

/* ── SCAN CHIPS ── */
.scan-bar{background:#0a0e14;border-bottom:1px solid var(--border);padding:5px 12px;display:flex;gap:5px;overflow-x:auto;align-items:center;-webkit-overflow-scrolling:touch;}
.scan-bar::-webkit-scrollbar{display:none;}
.scan-lbl{color:var(--g3);font-size:9px;letter-spacing:1px;white-space:nowrap;font-weight:700;}
.chip{padding:3px 9px;border-radius:3px;border:1px solid var(--border2);background:none;color:var(--g2);font-size:9px;cursor:pointer;white-space:nowrap;font-family:inherit;letter-spacing:.5px;}
.chip.active{border-color:rgba(0,232,122,.35);background:rgba(0,232,122,.08);color:var(--green);font-weight:700;}
.chip.active.hard{border-color:rgba(255,213,79,.35);background:rgba(255,213,79,.08);color:var(--yellow);}

/* ── TABLE ── */
.container{padding:8px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;color:var(--g3);font-size:9px;padding:5px 7px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;font-weight:500;}
td{padding:7px 7px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr.stock-row{cursor:pointer;transition:background .1s;}
tr.stock-row:hover td{background:rgba(255,255,255,.03);}
tr.stock-row.open td{background:rgba(41,182,246,.04);}
.ticker{font-weight:700;font-size:13px;color:var(--blue);letter-spacing:.5px;}
.score-big{font-weight:700;font-size:13px;}
.score-max{color:var(--g3);font-size:8px;margin-left:1px;}
.badge{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;}
.b-green{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);color:var(--green);}
.b-yellow{background:rgba(255,213,79,.1);border:1px solid rgba(255,213,79,.25);color:var(--yellow);}
.b-red{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.25);color:#ff6b6b;}
.b-none{color:var(--g3);font-size:10px;}
.pts{font-size:7px;opacity:.35;font-weight:400;}
.warn{font-size:8px;}
.expand-arrow{color:var(--g3);font-size:8px;transition:transform .2s;}
.expand-arrow.open{transform:rotate(180deg);}

/* ── DETAIL PANEL ── */
.detail-td{padding:0!important;border-bottom:1px solid var(--border2)!important;}
.detail-pane{background:#111620;padding:8px 10px;animation:fadeIn .2s ease;border-top:1px solid var(--border);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.d-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.d-name{font-size:14px;font-weight:700;color:var(--blue);letter-spacing:.5px;}
.d-score{font-size:16px;font-weight:700;}
.d-meta{color:var(--g2);font-size:9px;margin-top:1px;}
.chart-section{margin-bottom:6px;}
.chart-title{color:var(--g2);font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-weight:600;}
.no-chart{color:var(--g3);font-size:11px;padding:16px;text-align:center;}

/* ── INFO CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:10px;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:11px;}
.card-title{color:var(--g3);font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-weight:600;}
.cluster-row{margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.cluster-tickers{color:var(--g2);font-size:10px;margin-top:2px;padding-left:16px;}

/* ── UPLOAD ── */
.upload-wrap{padding:16px;max-width:540px;}
.upload-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:16px;}
.upload-title.hard{color:var(--yellow);}
.field{margin-bottom:11px;}
.field label{display:block;color:var(--g3);font-size:9px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.field input[type=date],.field input[type=text]{background:var(--bg2);border:1px solid var(--border2);color:var(--white);padding:8px 10px;border-radius:4px;font-size:12px;width:100%;outline:none;font-family:inherit;}
.drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:28px 16px;text-align:center;cursor:pointer;background:var(--bg2);transition:all .2s;margin-bottom:11px;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:rgba(0,232,122,.04);}
.drop-zone.ready{border-color:rgba(0,232,122,.4);border-style:solid;}
.drop-icon{font-size:28px;margin-bottom:7px;}
.drop-main{color:var(--g1);font-size:12px;line-height:1.8;}
.drop-main.ok{color:var(--green);font-weight:600;}
.drop-sub{color:var(--g3);font-size:10px;margin-top:3px;}
.preview{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:9px;margin-bottom:11px;}
.preview-lbl{color:var(--g3);font-size:8px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.preview-txt{color:var(--g2);font-size:9px;white-space:pre;overflow-x:auto;line-height:1.6;max-height:80px;}
.err{color:var(--red);font-size:10px;min-height:14px;margin-bottom:8px;}
.btn-add{background:var(--green);color:#000;border:none;padding:10px 22px;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1.5px;font-family:inherit;transition:opacity .2s;}
.btn-add.hard{background:var(--yellow);}
.btn-add:disabled{opacity:.3;cursor:not-allowed;}
details summary{color:var(--g3);font-size:9px;letter-spacing:1px;cursor:pointer;margin-top:13px;text-transform:uppercase;user-select:none;}
textarea{background:var(--bg2);border:1px solid var(--border2);color:var(--white);padding:10px;border-radius:4px;font-size:10px;width:100%;resize:vertical;line-height:1.7;outline:none;margin-top:7px;font-family:'Courier New',monospace;}
.schema{margin-top:16px;padding:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;}
.schema-ttl{color:var(--g3);font-size:8px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.schema-row{display:flex;gap:10px;margin-bottom:3px;}
.schema-k{color:rgba(0,232,122,.6);min-width:90px;font-size:10px;font-family:'Courier New',monospace;}
.schema-v{color:var(--g2);font-size:10px;}

/* ── COMPARE ── */
.compare-wrap{padding:12px;overflow-x:auto;}
.compare-ttl{color:var(--g3);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

/* ── MANAGE ── */
.manage-wrap{padding:16px;}
.manage-ttl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:13px;text-transform:uppercase;}
.manage-ttl.hard{color:var(--yellow);}
.scan-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px;}
.scan-info{flex:1;min-width:0;}
.scan-name{color:var(--white);font-weight:600;font-size:13px;}
.scan-meta{color:var(--g2);font-size:10px;margin-top:2px;}
.seed-tag{color:rgba(0,232,122,.3);font-size:8px;margin-left:6px;letter-spacing:1px;}
.btn-view{padding:4px 10px;background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.2);color:var(--green);border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;}
.btn-del{padding:4px 10px;background:rgba(239,83,80,.08);border:1px solid rgba(239,83,80,.2);color:var(--red);border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:34px;margin-bottom:11px;}
.empty-txt{color:var(--g3);font-size:12px;letter-spacing:1px;margin-bottom:14px;text-transform:uppercase;}
</style>

// ════════════════════════════════════════════════════════════════
// UPLOAD — statisch im HTML verdrahtet
// ════════════════════════════════════════════════════════════════
function initUpload(){
  const input=document.getElementById("csv-file-input");
  if(!input)return;
  input.addEventListener("change",function(){
    const files=Array.from(this.files);
    if(!files.length)return;
    if(files.length===1)handleFile(files[0]);
    else handleMultiFile(files);
    this.value="";
  });
}
function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const dm=file.name.match(/(\d{4}-\d{2}-\d{2})/);
    state[uni].form={csv:e.target.result,file:file.name,date:dm?dm[1]:new Date().toISOString().slice(0,10),label:file.name.replace(/\.csv$/i,"").replace(/[_]/g," ").trim()};
    updateUploadUI();
  };
  reader.readAsText(file);
}
function handleMultiFile(files){
  let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=function(ev){
      const raw=parseCSV(ev.target.result);
      if(raw.length){const dm=file.name.match(/(\d{4}-\d{2}-\d{2})/);U().scans.push(buildScan(dm?dm[1]:new Date().toISOString().slice(0,10),file.name.replace(/\.csv$/i,"").replace(/[_]/g," ").trim(),raw));}
      if(++done===files.length){sortScansChronologically();saveU();expandedTicker=null;switchTab(0);}
    };
    r.readAsText(file);
  });
}
function updateUploadUI(){
  const f=U().form;
  const status=document.getElementById("upload-status");
  const preview=document.getElementById("upload-preview");
  const previewTxt=document.getElementById("preview-text");
  const addBtn=document.getElementById("add-scan-btn");
  if(!status)return;
  if(f&&f.csv){
    status.style.color="#00e87a";
    status.textContent="✓ "+f.file+"  ·  "+f.date;
    if(previewTxt)previewTxt.textContent=f.csv.split("\n").slice(0,3).join("\n")+"…";
    if(preview)preview.style.display="block";
    if(addBtn)addBtn.style.display="block";
  } else {
    status.textContent="";
    if(preview)preview.style.display="none";
    if(addBtn)addBtn.style.display="none";
  }
}
function renderUpload(){
  const title=document.getElementById("upload-title");
  const addBtn=document.getElementById("add-scan-btn");
  if(title){const acol=uni==="hard"?"#ffd54f":"#00e87a";title.style.color=acol;title.textContent=(uni==="soft"?"🟢":"🟡")+" NEUER SCAN — "+uni.toUpperCase();if(addBtn)addBtn.style.background=acol;}
  updateUploadUI();
}
function applyManual(){
  const ta=document.getElementById("manual-csv");
  if(ta&&ta.value.trim()){state[uni].form={csv:ta.value,file:"manual",date:new Date().toISOString().slice(0,10),label:"Manuell"};updateUploadUI();}
}
function sortScansChronologically(){
  U().scans.sort((a,b)=>a.date.localeCompare(b.date));
  // Auto-Cleanup: max 30 Scans behalten (älteste fliegen raus, Seeds bleiben)
  const MAX=60;
  if(U().scans.length>MAX){
    const seeds=U().scans.filter(s=>U().seedIds.has(s.id));
    const nonSeeds=U().scans.filter(s=>!U().seedIds.has(s.id));
    // Älteste NonSeeds entfernen bis max erreicht
    const keep=nonSeeds.slice(-(MAX-seeds.length));
    U().scans=[...seeds,...keep].sort((a,b)=>a.date.localeCompare(b.date));
  }
  U().sel=U().scans.length-1;
}
function doAdd(){
  const f=U().form;const err=document.getElementById("upload-err");
  if(!f||!f.csv){if(err)err.textContent="Keine Daten.";return;}
  const raw=parseCSV(f.csv);
  if(!raw.length){if(err)err.textContent="CSV konnte nicht geparst werden.";return;}
  if(err)err.textContent="";
  U().scans.push(buildScan(f.date,f.label||f.date,raw));
  sortScansChronologically();saveU();
  state[uni].form={date:new Date().toISOString().slice(0,10),label:"",csv:"",file:""};
  expandedTicker=null;switchTab(0);
}

// ════════════════════════════════════════════════════════════════
// SCORING — 100 Punkte System
// ════════════════════════════════════════════════════════════════
function ratio(s){return s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null);}
function pATR(v){if(v==null)return 0;if(v<2.5)return 20;if(v<=3.2)return 12;if(v<=4.0)return 8;return 0;}
function pV1W(v){if(v==null)return 0;if(v<2.0)return 20;if(v<=2.5)return 12;return 0;}
function pRAT(v){if(v==null)return 0;if(v>1.15)return 20;if(v>=1.0)return 10;return 0;}
function pRV(v){if(v==null)return 0;if(v<0.7)return 20;if(v<=1.2)return 10;return 0;}
function pRSI(v){if(v==null)return 0;if(v>=45&&v<=65)return 20;if(v>65&&v<=80)return 15;return 0;}
function score(s){
  const r=ratio(s);
  // Gewichtung: ATR×1.5, Vola1W×1.5, RelVol×1.0, Ratio×0.5, RSI×0.5 → max 100
  return Math.round(pATR(s.atr)*1.5 + pV1W(s.v1w)*1.5 + pRV(s.rv)*1.0 + pRAT(r)*0.5 + pRSI(s.rsi)*0.5);
}
function scoreColor(n){if(n>=85)return"#00e87a";if(n>=65)return"#ffd54f";if(n>=40)return"#ffb74d";return"#ef5350";}
function badgeCls(pts){const p=pts/20;if(p>=0.9)return"badge b-green";if(p>=0.5)return"badge b-yellow";return"badge b-red";}

// ════════════════════════════════════════════════════════════════
// CSV PARSER — erkennt echte TradingView-Header automatisch
// ════════════════════════════════════════════════════════════════
function parseCSV(text){
  function splitLine(line){
    const r=[];let c="";let q=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c="";}else c+=ch;}
    r.push(c.trim());return r;
  }
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const hdrs=splitLine(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const cols=splitLine(line);
    const row={};hdrs.forEach((h,i)=>{row[h]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    const norm=s=>s.toLowerCase().replace(/ä/g,"a").replace(/ö/g,"o").replace(/ü/g,"u").replace(/ß/g,"ss");
    const rowNorm={};Object.keys(row).forEach(k=>{rowNorm[norm(k)]=row[k];});
    const n=(...keys)=>{
      for(const k of keys){
        // 1. Exakter Match
        if(row[k]!==undefined&&row[k]!==''){const v=parseFloat(row[k]);if(!isNaN(v))return v;}
        // 2. Normalisierter Match
        const nk=norm(k);
        if(rowNorm[nk]!==undefined&&rowNorm[nk]!==''){const v=parseFloat(rowNorm[nk]);if(!isNaN(v))return v;}
      }
      return null;
    };
    const atr=n("Average True Range %, 14, 1 Tag","average true range %, 14, 1 tag","average true range % (14) 1 tag","average true range");
    const v1w=n("Volatilität, 1 Woche","volatilitat, 1 woche","volatilität 1 woche","volatilitat 1 woche","vola1w","vola 1w");
    const v1m=n("Volatilität, 1 Monat","volatilitat, 1 monat","volatilität 1 monat","volatilitat 1 monat","vola1m","vola 1m");
    const rv=n("Relatives Volumen, 1 Tag","relatives volumen, 1 tag","relatives volumen 1 tag","relatives volumen","relvol","rel vol");
    const rsi=n("Relative Strength Index, 14, 1 Tag","relative strength index, 14, 1 tag","relative strength index (14) 1 tag","relative strength index");
    const rat=n("ratio")??(v1m&&v1w?v1m/v1w:null);
    const t=(row.ticker||row.symbol||"").toUpperCase();
    const sec=row.sector||row.sektor||row.branche||row["sektor"]||"";
    const price=n("Preis","preis","letzter","last","price","close","schlusskurs");
    const sma50=n("Einfacher gleitender Durchschnitt, 50, 1 Tag","einfacher gleitender durchschnitt, 50, 1 tag","einfacher gleitender durchschnitt (50) 1 tag","sma(50)","sma50","sma 50");
    const high52w=n("Hoch, 52 Wochen","hoch, 52 wochen","hoch 52 wochen","52-wochen-hoch","52w-hoch","52-week high");
    if(!t)return null;
    return{t,atr,v1w,v1m,ratio:rat,rv,rsi,sec,price,sma50,high52w};
  }).filter(Boolean);
}

function buildScan(date,label,raw,time=""){
  const stocks=raw.map(s=>({
    t:s.t, atr:s.atr, v1w:s.v1w, v1m:s.v1m,
    ratio:s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null),
    rv:s.rv, rsi:s.rsi, sec:s.sec,
    price:s.price??null, sma50:s.sma50??null, high52w:s.high52w??null
  }));
  stocks.sort((a,b)=>score(b)-score(a));
  const top=stocks.slice(0,10);
  const map={};top.forEach(s=>{if(s.sec)map[s.sec]=(map[s.sec]||[]).concat(s.t);});
  const cs=new Set(Object.entries(map).filter(([,v])=>v.length>=3).map(([k])=>k));
  stocks.forEach(s=>s.cluster=cs.has(s.sec));
  return{id:Date.now()+Math.floor(Math.random()*9999),date,time,label:label||date,stocks};
}

// ════════════════════════════════════════════════════════════════
// HISTORY — alle Datenpunkte eines Tickers über alle Scans
// ════════════════════════════════════════════════════════════════
function getHistory(ticker){
  const raw=U().scans.map(sc=>{
    const s=sc.stocks.find(x=>x.t===ticker);
    if(!s)return null;
    const r=ratio(s);
    const sma50pct=(s.price!=null&&s.sma50!=null&&s.sma50>0)?((s.price-s.sma50)/s.sma50*100):null;
    return{date:sc.date,label:sc.label,atr:s.atr,v1w:s.v1w,rsi:s.rsi,rv:s.rv,ratio:r,score:score(s),sma50pct,price:s.price,sma50:s.sma50,high52w:s.high52w};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
  // Pro Datum nur einen Eintrag — letzter Scan des Tages
  const byDate={};
  raw.forEach(h=>{byDate[h.date]=h;});
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}

function calcBadges(ticker){
  const hist=getHistory(ticker);
  const N=hist.length;
  const badges=[];

  // ── SQUEEZE ──
  if(N>=2){
    let streak=0;
    for(let i=N-1;i>=0;i--){
      const h=hist[i];
      if(h.score>=75&&h.rv!=null&&h.rv<0.5) streak++;
      else break;
    }
    if(streak>=2) badges.push({
      id:"squeeze",icon:"🔴",short:"SQZ",
      title:"🔴 SQUEEZE — Ruhe vor dem Sturm",
      body:`Score ≥75 & RelVol <0.5 seit ${streak} Tag${streak>1?"en":""}.\n\nKeiner will mehr verkaufen. Die Aktie ist "trocken" und bereit für einen explosiven Sprung nach oben.`,
      col:"#ef5350",bg:"rgba(239,83,80,.12)",border:"rgba(239,83,80,.4)"
    });
  }

  // ── TIGHTNESS ──
  if(N>=3){
    const last3=hist.slice(-3);
    const allBelow=last3.every(h=>h.ratio!=null&&h.ratio<1.0);
    const falling=last3[2].ratio<=last3[0].ratio;
    if(allBelow&&falling) badges.push({
      id:"tightness",icon:"🟡",short:"TGT",
      title:"🟡 TIGHTNESS — Maximale Enge",
      body:`Die tägliche Schwankung (ATR) ist seit 3 Tagen kleiner als der Wochendurchschnitt (Ratio < 1.0).\nTrend: ${last3[0].ratio?.toFixed(2)} → ${last3[2].ratio?.toFixed(2)}\n\nInstitutionen kontrollieren den Preis extrem genau. Das Risiko für einen Rücksetzer ist hier am geringsten.`,
      col:"#ffd54f",bg:"rgba(255,213,79,.12)",border:"rgba(255,213,79,.4)"
    });
  }

  // ── ACCUMULATION ──
  if(N>=3){
    const ref=hist[Math.max(0,N-4)];
    const cur=hist[N-1];
    const rsiUp=cur.rsi!=null&&ref.rsi!=null&&cur.rsi>ref.rsi;
    const ratioDown=cur.ratio!=null&&ref.ratio!=null&&cur.ratio<=ref.ratio;
    const ratioOk=cur.ratio!=null&&cur.ratio<1.2;
    if(rsiUp&&ratioDown&&ratioOk) badges.push({
      id:"accum",icon:"🟢",short:"ACC",
      title:"🟢 ACCUMULATION — Stilles Sammeln",
      body:`Kaufdruck (RSI) steigt: ${ref.rsi?.toFixed(0)} → ${cur.rsi?.toFixed(0)}\nVolatilität (Ratio) bleibt am Boden: ${ref.ratio?.toFixed(2)} → ${cur.ratio?.toFixed(2)}\n\nProfis kaufen heimlich große Mengen auf, ohne den Kurs hektisch zu machen. Ein sehr bullisches Zeichen.`,
      col:"#00e87a",bg:"rgba(0,232,122,.12)",border:"rgba(0,232,122,.4)"
    });
  }

  // ── COMPRESSION: SMA50-Abstand sinkt 3 Tage + bleibt 2-10% + Ratio<1.15 ──
  if(N>=3){
    const last3=hist.slice(-3);
    const hasSma=last3.every(h=>h.sma50pct!=null);
    if(hasSma){
      const falling=last3[2].sma50pct<last3[0].sma50pct; // Abstand sinkt
      const inRange=last3.every(h=>h.sma50pct>=2&&h.sma50pct<=12); // gesunde Zone
      const ratioOk=hist[N-1].ratio!=null&&hist[N-1].ratio<1.15;
      const scoreOk=hist[N-1].score>40;
      if(falling&&inRange&&ratioOk&&scoreOk) badges.push({
        id:"compression",icon:"🔵",short:"CMP",
        title:"🔵 COMPRESSION — Feder wird gespannt",
        body:`SMA50-Abstand sinkt: ${last3[0].sma50pct?.toFixed(1)}%→${last3[2].sma50pct?.toFixed(1)}%
Ratio: ${hist[N-1].ratio?.toFixed(2)} (<1.15)

Kurs und gleitender Durchschnitt laufen aufeinander zu. Die Kontraktion verdichtet sich — kurz vor dem Ausbruch.`,
        col:"#29b6f6",bg:"rgba(41,182,246,.12)",border:"rgba(41,182,246,.4)"
      });
    }
  }

  // ── COMPRESSION: SMA50-Abstand sinkt 3 Tage + bleibt 2-10% + Ratio<1.15 ──
  if(N>=3){
    const last3=hist.slice(-3);
    const hasSma=last3.every(h=>h.sma50pct!=null);
    if(hasSma){
      const falling=last3[2].sma50pct<last3[0].sma50pct; // Abstand sinkt
      const inRange=last3.every(h=>h.sma50pct>=2&&h.sma50pct<=10); // gesunde Zone
      const ratioOk=hist[N-1].ratio!=null&&hist[N-1].ratio<1.15;
      const scoreOk=hist[N-1].score>40;
      if(falling&&inRange&&ratioOk&&scoreOk) badges.push({
        id:"compression",icon:"🔵",short:"CMP",
        title:"🔵 COMPRESSION — Feder wird gespannt",
        body:`SMA50-Abstand sinkt: ${last3[0].sma50pct?.toFixed(1)}%→${last3[2].sma50pct?.toFixed(1)}% (Zone: 2–10%)\nRatio: ${hist[N-1].ratio?.toFixed(2)} <1.15\n\nKurs und gleitender Durchschnitt laufen aufeinander zu. Die Feder wird gespannt — klassisches VCP-Verhalten kurz vor dem Ausbruch.`,
        col:"#29b6f6",bg:"rgba(41,182,246,.12)",border:"rgba(41,182,246,.4)"
      });
    }
  }

  return badges;
}

function showBadgePopup(id){
  // Alle offenen Popups schließen
  document.querySelectorAll(".badge-popup").forEach(p=>p.remove());
  const badge=_lastBadges&&_lastBadges[id];
  if(!badge)return;
  const popup=document.createElement("div");
  popup.className="badge-popup";
  popup.style.cssText=`position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#111620;border:1px solid ${badge.border};border-radius:10px;
    padding:18px;max-width:300px;width:88%;z-index:1000;
    box-shadow:0 8px 32px rgba(0,0,0,.8)`;
  popup.innerHTML=`
    <div style="font-size:13px;font-weight:700;color:${badge.col};margin-bottom:10px;line-height:1.4">${badge.title}</div>
    <div style="font-size:11px;color:#90a4ae;line-height:1.7;white-space:pre-wrap">${badge.body}</div>
    <button onclick="document.querySelectorAll('.badge-popup').forEach(p=>p.remove())"
      style="margin-top:14px;width:100%;padding:9px;background:${badge.bg};border:1px solid ${badge.border};
             color:${badge.col};border-radius:6px;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit">
      SCHLIESSEN
    </button>`;
  // Backdrop
  const bd=document.createElement("div");
  bd.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999";
  bd.onclick=()=>{popup.remove();bd.remove();};
  document.body.appendChild(bd);
  document.body.appendChild(popup);
}

let _lastBadges={};

function renderBadges(ticker,compact=false){
  const badges=calcBadges(ticker);
  // Badges global speichern für Popup-Zugriff
  badges.forEach(b=>{_lastBadges[b.id]=b;});
  if(!badges.length) return "";
  if(compact){
    return badges.map(b=>
      `<span onclick="event.stopPropagation();showBadgePopup('${b.id}')"
        style="font-size:11px;cursor:pointer;margin-left:2px" title="${b.short}">${b.icon}</span>`
    ).join("");
  }
  return`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">${
    badges.map(b=>`
      <button onclick="showBadgePopup('${b.id}')"
        style="display:inline-flex;align-items:center;gap:4px;padding:4px 9px;
               border-radius:5px;background:${b.bg};border:1px solid ${b.border};
               cursor:pointer;font-family:inherit">
        <span style="font-size:11px">${b.icon}</span>
        <span style="color:${b.col};font-size:9px;font-weight:700;letter-spacing:.5px">${b.short}</span>
      </button>`).join("")
  }</div>`;
}


function buildCharts(ticker){
  const hist=getHistory(ticker);
  if(hist.length<1)return`<div class="no-chart">Keine History.</div>`;
  if(hist.length<2)return`<div class="no-chart" style="padding:14px;color:#546e7a;font-size:11px;text-align:center">Nur 1 Datenpunkt – lade weitere Scans.</div>`;

  const PL=26,PR=8,PT=6,PB=16;
  const N=hist.length;
  const spacing=Math.min(20,Math.max(12,(260-PL-PR)/(N-1||1)));
  const W=PL+spacing*(N-1)+PR+18;

  function px(i){return PL+i*spacing;}
  function py(v,mn,mx,H){const ih=H-PT-PB;if(mx===mn)return PT+ih/2;return PT+ih*(1-(v-mn)/(mx-mn));}
  function mm(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(!v.length)return[0,1];return[Math.min(...v),Math.max(...v)];}
  function pl(pts,col,sw=1.5,dash=""){return`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"${dash?` stroke-dasharray="${dash}"`:""}/>`;}
  function cr(cx,cy,col,r=2){return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="rgba(0,0,0,.5)" stroke-width=".6"/>`;}
  function gh(y,w){return`<line x1="${PL}" y1="${y}" x2="${w-PR}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;}
  function yl(txt,y,col="#546e7a"){return`<text x="${PL-3}" y="${y}" font-size="6.5" fill="${col}" text-anchor="end" dominant-baseline="middle" font-family="inherit">${txt}</text>`;}
  function xl(txt,x,y){return`<text x="${x}" y="${y}" font-size="6.5" fill="#37474f" text-anchor="middle" font-family="inherit">${txt}</text>`;}
  function tag(txt,col,x,y){return`<text x="${x}" y="${y}" font-size="7" fill="${col}" font-weight="700" text-anchor="start" dominant-baseline="middle" font-family="inherit">${txt}</text>`;}
  function svg(H,body){return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">${body}</svg>`;}
  function xlbls(H){return hist.map((h,i)=>xl(h.date.slice(5),px(i),(H-PB+12))).join("");}
  function sec(title,s,leg=""){return`<div class="chart-section"><div class="chart-title" style="font-size:7px;margin-bottom:2px">${title}</div><div style="background:#0d1219;border:1px solid #1e2836;border-radius:3px;padding:4px 2px 1px;overflow:hidden">${s}</div>${leg?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;padding:0 2px">${leg}</div>`:""}</div>`;}
  function ld(col,t){return`<span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#546e7a"><span style="width:6px;height:6px;background:${col};border-radius:1px;display:inline-block"></span>${t}</span>`;}
  function ll(col,t){return`<span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#546e7a"><span style="width:10px;height:2px;background:${col};display:inline-block;border-radius:1px"></span>${t}</span>`;}

  // ── 0: SCORE-VERLAUF ──────────────────────────────────────────
  const H0=52;
  const scores=hist.map(h=>h.score);
  const [s0,s1]=mm([...scores]);
  const sp=[Math.max(0,s0-8),Math.min(100,s1+8)];
  const sPts=scores.map((v,i)=>`${px(i).toFixed(1)},${py(v,sp[0],sp[1],H0).toFixed(1)}`).join(" ");
  const sArea=`<polygon points="${px(0).toFixed(1)},${(H0-PB).toFixed(1)} ${sPts} ${px(N-1).toFixed(1)},${(H0-PB).toFixed(1)}" fill="rgba(41,182,246,.06)"/>`;
  const sDots=scores.map((v,i)=>{
    const c=v>=80?"#00e87a":v>=60?"#ffd54f":v>=40?"#ffb74d":"#ef5350";
    return cr(px(i).toFixed(1),py(v,sp[0],sp[1],H0).toFixed(1),c,2.5)+
      `<text x="${px(i).toFixed(1)}" y="${(py(v,sp[0],sp[1],H0)-6).toFixed(1)}" font-size="7" fill="${c}" text-anchor="middle" font-weight="700" font-family="inherit">${v}</text>`;
  }).join("");
  // Ref-Linien bei 60 und 80
  [60,80].forEach(()=>{}); // just for clarity
  const sRefs=[60,80].map(v=>{
    const y=py(v,sp[0],sp[1],H0);
    return gh(y.toFixed(1),W)+yl(v,y.toFixed(1));
  }).join("");

  const svg0=svg(H0,`${sRefs}${sArea}${pl(sPts,"#29b6f6",2)}${sDots}${xlbls(H0)}`);

  // ── 1: VOLATILITÄT ATR% + VOLA1W% ───────────────────────────
  const H1=75;
  const atrs=hist.map(h=>h.atr),v1ws=hist.map(h=>h.v1w);
  const [v0,v1]=mm([...atrs,...v1ws]);
  const vn=Math.max(0,v0*.9),vx=v1*1.06;
  const aTop=atrs.map((v,i)=>`${px(i).toFixed(1)},${py(v,vn,vx,H1).toFixed(1)}`).join(" ");
  const vBot=[...v1ws.keys()].reverse().map(i=>`${px(i).toFixed(1)},${py(v1ws[i],vn,vx,H1).toFixed(1)}`).join(" ");
  const vGrid=[vn,(vn+vx)/2,vx].map(v=>gh(py(v,vn,vx,H1).toFixed(1),W)+yl(v.toFixed(1)+"%",py(v,vn,vx,H1).toFixed(1))).join("");
  const aPts=atrs.map((v,i)=>`${px(i).toFixed(1)},${py(v,vn,vx,H1).toFixed(1)}`).join(" ");
  const vPts=v1ws.map((v,i)=>`${px(i).toFixed(1)},${py(v,vn,vx,H1).toFixed(1)}`).join(" ");
  const lAY=py(atrs[N-1],vn,vx,H1),lVY=py(v1ws[N-1],vn,vx,H1);

  // SMA50-Abstand Linie (zweite Y-Achse: 0-20%)
  const sma50pcts=hist.map(h=>h.sma50pct);
  const hasSma50=sma50pcts.some(v=>v!=null);
  const [sm0,sm1]=hasSma50?mm(sma50pcts.filter(v=>v!=null)):[0,20];
  const smPts=sma50pcts.map((v,i)=>v!=null?`${px(i).toFixed(1)},${py(v,Math.min(sm0,0),Math.max(sm1,15),H1).toFixed(1)}`:null).filter(Boolean).join(" ");
  const lastSmY=sma50pcts[N-1]!=null?py(sma50pcts[N-1],Math.min(sm0,0),Math.max(sm1,15),H1):null;

  const svg1=svg(H1,`
    ${vGrid}
    <polygon points="${aTop} ${vBot}" fill="rgba(41,182,246,.06)"/>
    ${pl(aPts,"#29b6f6",2)}
    ${atrs.map((v,i)=>cr(px(i).toFixed(1),py(v,vn,vx,H1).toFixed(1),"#29b6f6")).join("")}
    ${pl(vPts,"#ffb74d",2)}
    ${v1ws.map((v,i)=>cr(px(i).toFixed(1),py(v,vn,vx,H1).toFixed(1),"#ffb74d")).join("")}
    ${tag("ATR","#29b6f6",W-PR+2,lAY.toFixed(1))}
    ${tag("V1W","#ffb74d",W-PR+2,(lVY+9).toFixed(1))}
    ${xlbls(H1)}`);

  // ── SMA50-ABSTAND — eigener Chart ────────────────────────────
  const H_SMA=65;
  let svgSMA="";
  if(hasSma50){
    const validSma=sma50pcts.filter(v=>v!=null);
    const smMin=Math.min(...validSma,0)-1;
    const smMax=Math.max(...validSma,15)+1;
    const smaPts2=hist.map((h,i)=>h.sma50pct!=null?`${px(i).toFixed(1)},${py(h.sma50pct,smMin,smMax,H_SMA).toFixed(1)}`:null).filter(Boolean).join(" ");
    const y2=py(2,smMin,smMax,H_SMA),y10=py(10,smMin,smMax,H_SMA);
    const smaDots2=hist.map((h,i)=>{
      if(h.sma50pct==null)return"";
      const col=h.sma50pct>=2&&h.sma50pct<=10?"#29b6f6":h.sma50pct>10?"#ffd54f":"#ef5350";
      return cr(px(i).toFixed(1),py(h.sma50pct,smMin,smMax,H_SMA).toFixed(1),col);
    }).join("");
    const smaYLbls=[smMin+1,5,10,smMax-1].filter(v=>v>smMin&&v<smMax).map(v=>
      yl(v.toFixed(0)+"%",py(v,smMin,smMax,H_SMA).toFixed(1))
    ).join("");
    const lastV=hist[N-1].sma50pct;
    const lastCol=lastV!=null?(lastV>=2&&lastV<=10?"#29b6f6":lastV>10?"#ffd54f":"#ef5350"):"#546e7a";
    svgSMA=svg(H_SMA,`
      <rect x="${PL}" y="${Math.min(y2,y10).toFixed(1)}" width="${W-PL-PR}" height="${Math.abs(y2-y10).toFixed(1)}" fill="rgba(41,182,246,.05)"/>
      <line x1="${PL}" y1="${y10.toFixed(1)}" x2="${W-PR}" y2="${y10.toFixed(1)}" stroke="rgba(41,182,246,.3)" stroke-width=".8" stroke-dasharray="3,2"/>
      <line x1="${PL}" y1="${y2.toFixed(1)}" x2="${W-PR}" y2="${y2.toFixed(1)}" stroke="rgba(41,182,246,.3)" stroke-width=".8" stroke-dasharray="3,2"/>
      ${gh(py((smMin+smMax)/2,smMin,smMax,H_SMA).toFixed(1),W)}
      ${smaPts2?pl(smaPts2,"#29b6f6",1.8):""}
      ${smaDots2}
      ${lastV!=null?tag("SMA50",lastCol,W-PR+2,py(lastV,smMin,smMax,H_SMA).toFixed(1)):""}
      ${smaYLbls}
      ${xlbls(H_SMA)}`);
  }
  const H2=52;
  const rsis=hist.map(h=>h.rsi);
  const rm=35,rM=85;
  const z45=py(45,rm,rM,H2),z65=py(65,rm,rM,H2),z80=py(80,rm,rM,H2);
  const rPts=rsis.map((v,i)=>`${px(i).toFixed(1)},${py(v,rm,rM,H2).toFixed(1)}`).join(" ");
  const lRY=py(rsis[N-1],rm,rM,H2);

  const svg2=svg(H2,`
    <rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${(z80-PT).toFixed(1)}" fill="rgba(239,83,80,.04)"/>
    <rect x="${PL}" y="${z80.toFixed(1)}" width="${W-PL-PR}" height="${(z65-z80).toFixed(1)}" fill="rgba(255,213,79,.05)"/>
    <rect x="${PL}" y="${z65.toFixed(1)}" width="${W-PL-PR}" height="${(z45-z65).toFixed(1)}" fill="rgba(0,232,122,.06)"/>
    <rect x="${PL}" y="${z45.toFixed(1)}" width="${W-PL-PR}" height="${(H2-PB-z45).toFixed(1)}" fill="rgba(239,83,80,.04)"/>
    ${[{v:45,c:"rgba(239,83,80,.3)"},{v:65,c:"rgba(0,232,122,.4)"},{v:80,c:"rgba(255,213,79,.3)"}].map(({v,c})=>`<line x1="${PL}" y1="${py(v,rm,rM,H2).toFixed(1)}" x2="${W-PR}" y2="${py(v,rm,rM,H2).toFixed(1)}" stroke="${c}" stroke-width=".7" stroke-dasharray="3,2"/>${yl(v,py(v,rm,rM,H2).toFixed(1))}`).join("")}
    <polygon points="${px(0).toFixed(1)},${(H2-PB).toFixed(1)} ${rPts} ${px(N-1).toFixed(1)},${(H2-PB).toFixed(1)}" fill="rgba(206,147,216,.07)"/>
    ${pl(rPts,"#ce93d8",1.8)}
    ${rsis.map((v,i)=>cr(px(i).toFixed(1),py(v,rm,rM,H2).toFixed(1),v>=45&&v<=65?"#00e87a":v<=80?"#ffd54f":"#ef5350",2.4)).join("")}
    ${tag("RSI","#ce93d8",W-PR+2,lRY.toFixed(1))}
    ${xlbls(H2)}`);

  // ── 3: RelVol + Ratio ────────────────────────────────────────
  const H3=55;
  const rvs=hist.map(h=>h.rv);
  const rvM=Math.max(...rvs,1.6);
  const [rm2,rM2]=mm([...hist.map(h=>h.ratio).filter(Boolean),0.85,1.25]);
  const bw=Math.max(3,Math.min(7,Math.floor(spacing/2.2)));
  const bars=rvs.map((v,i)=>{
    const bh=(H3-PT-PB)*(Math.min(v,rvM)/rvM);
    const c=v<0.7?"#00e87a":v<=1.2?"#ffd54f":"#ef5350";
    return`<rect x="${(px(i)-bw/2).toFixed(1)}" y="${(H3-PB-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="${c}" opacity="${v<0.7?.85:.55}" rx="1"/>`;
  }).join("");
  const y10=(H3-PB-(H3-PT-PB)*(1/rvM));
  const rPts3=hist.map((h,i)=>h.ratio?`${px(i).toFixed(1)},${py(h.ratio,rm2,rM2,H3).toFixed(1)}`:null).filter(Boolean).join(" ");
  const y115=py(1.15,rm2,rM2,H3);
  const lRat=hist[N-1].ratio;

  const svg3=svg(H3,`
    ${gh((H3-PB-(H3-PT-PB)*.5).toFixed(1),W)}
    ${bars}
    <line x1="${PL}" y1="${y10.toFixed(1)}" x2="${W-PR}" y2="${y10.toFixed(1)}" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="4,3"/>
    ${yl("1.0",y10.toFixed(1))}
    <line x1="${PL}" y1="${y115.toFixed(1)}" x2="${W-PR}" y2="${y115.toFixed(1)}" stroke="rgba(41,182,246,.25)" stroke-width=".8" stroke-dasharray="3,2"/>
    ${rPts3?pl(rPts3,"rgba(41,182,246,.8)",1.5):""}
    ${hist.map((h,i)=>!h.ratio?"":cr(px(i).toFixed(1),py(h.ratio,rm2,rM2,H3).toFixed(1),h.ratio>1.15?"#00e87a":h.ratio>=1?"#ffd54f":"#ef5350",2.4)).join("")}
    ${lRat?tag("Ratio","#29b6f6",W-PR+2,py(lRat,rm2,rM2,H3).toFixed(1)):""}
    ${xlbls(H3)}`);

  return`
    ${sec("SCORE-VERLAUF",svg0)}
    ${sec("VOLATILITÄT — ATR% · VOLA 1W%",svg1,ll("#29b6f6","ATR %")+ll("#ffb74d","Vola 1W %")+"<span style='color:#37474f;font-size:9px'>Schatten = Kontraktion</span>")}
    ${hasSma50&&svgSMA?sec("SMA 50 — ABSTAND %",svgSMA,ld("#29b6f6","2–10% Ideal")+ld("#ffd54f",">10% Extended")+ld("#ef5350","<2% / Unter MA")):""}
    ${sec("RSI (14)",svg2,ld("#00e87a","45–65 ✓")+ld("#ffd54f","65–80")+ld("#ef5350","außerhalb"))}
    ${sec("REL. VOLUMEN · RATIO",svg3,ld("#00e87a","RV&lt;0.7")+ld("#ffd54f","0.7–1.2")+ld("#ef5350","&gt;1.2")+ll("#29b6f6","Ratio"))}`;
}

function cleanupScans(u){
  const st=state[u];
  const MAX=60;
  if(st.scans.length>MAX){
    const seeds=st.scans.filter(s=>st.seedIds.has(s.id));
    const nonSeeds=st.scans.filter(s=>!st.seedIds.has(s.id));
    const keep=nonSeeds.slice(-(MAX-seeds.length));
    st.scans=[...seeds,...keep].sort((a,b)=>a.date.localeCompare(b.date));
    localStorage.setItem(st.key,JSON.stringify(st.scans));
    console.log(`${u}: Cleanup ${nonSeeds.length-keep.length} alte Scans entfernt`);
  }
}

function loadAll(){
  ["soft","hard"].forEach(u=>{
    const st=state[u];
    try{
      const raw=localStorage.getItem(st.key);
      if(raw){
        const saved=JSON.parse(raw);
        const ids=new Set(saved.map(s=>s.id));
        st.scans=[...st.seeds.filter(s=>!ids.has(s.id)),...saved];
      }else{st.scans=[...st.seeds];localStorage.setItem(st.key,JSON.stringify(st.scans));}
    }catch(e){st.scans=[...st.seeds];}
  });
  cleanupScans("soft");
  cleanupScans("hard");
  setDot(true);
}
function saveU(){try{localStorage.setItem(U().key,JSON.stringify(U().scans));setDot(true);}catch(e){setDot(false);}}
function setDot(ok){
  const d=document.getElementById("dot"),l=document.getElementById("dot-lbl");
  if(!d)return;
  d.style.background=ok?"#00ff9d":"#ff4444";
  d.style.boxShadow=ok?"0 0 5px #00ff9d":"0 0 5px #ff4444";
  l.style.color=ok?"rgba(0,255,157,.5)":"rgba(255,68,68,.5)";
  l.textContent=ok?"STORAGE OK":"OFFLINE";
}

function buildScanList(st){
  // Gruppiere nach Datum
  const groups={};
  st.scans.forEach((s,i)=>{
    if(!groups[s.date])groups[s.date]=[];
    groups[s.date].push({s,i});
  });
  const dates=Object.keys(groups).sort().reverse(); // neueste oben
  const acol=uni==="hard"?"#ffd54f":"#00e87a";

  return dates.map(date=>{
    const entries=groups[date];
    const isActiveDate=entries.some(({i})=>i===st.sel);
    return`<div style="border-bottom:1px solid #0d1219">
      <div style="padding:6px 14px 2px;display:flex;align-items:center;gap:6px">
        <span style="color:${isActiveDate?acol:"#78909c"};font-size:11px;font-weight:700">${date}</span>
        <span style="color:#37474f;font-size:9px">${entries.length} Scan${entries.length!==1?"s":""}</span>
      </div>
      ${entries.map(({s,i})=>{
        const active=i===st.sel;
        const timeStr=s.time||"";
        const lbl=s.label||s.date;
        return`<button onclick="selScan(${i});toggleScanDD()" style="
          width:100%;text-align:left;padding:7px 14px 7px 22px;
          background:${active?"rgba(41,182,246,.07)":"none"};
          border:none;border-left:2px solid ${active?acol:"transparent"};
          color:${active?acol:"#90a4ae"};cursor:pointer;font-family:inherit;
          font-size:11px;display:flex;align-items:center;gap:8px">
          ${timeStr?`<span style="color:#546e7a;font-size:9px;min-width:38px">${timeStr}</span>`:""}
          <span style="flex:1">${lbl.replace(date,"").replace(/–|-/,"").trim()||lbl}</span>
          <span style="color:#37474f;font-size:9px">${s.stocks?.length||0} Aktien</span>
        </button>`;
      }).join("")}
    </div>`;
  }).join("");
}

  }
  const scan=st.scans[st.sel];
  const allStocks=scan.stocks; // alle, nicht nur top10 — wegen Cluster-Erkennung über Top10 hinaus ggf.
  const top10=scan.stocks.slice(0,10);

  // Cluster-Erkennung wie gehabt (auf Basis Top10 Sektoren)
  const secMap={};top10.forEach(s=>{if(s.sec)secMap[s.sec]=(secMap[s.sec]||[]).concat(s.t);});
  const hotSectors=new Set(Object.entries(secMap).filter(([,v])=>v.length>=2).map(([k])=>k));

  // Für jede Aktie: Marker + Score holen, dann sortieren: Sterne DESC, Score DESC
  const enriched=top10.map(s=>{

      s,sc,
      starCount:m?m.count:0,
      marker:m,
      isCluster:s.sec&&hotSectors.has(s.sec)&&secMap[s.sec].length>=2,
      isBigCluster:s.sec&&hotSectors.has(s.sec)&&secMap[s.sec].length>=3
    };
  });
  enriched.sort((a,b)=>b.starCount-a.starCount||b.sc-a.sc);

  const mcols={"ATR↓":"#29b6f6","RV↓":"#00e87a","SMA✓":"#ce93d8","52W✓":"#ffd54f","RAT↓":"#ffb74d"};

// POSITION — SMA50 & 52W-Hoch Abstände
// ════════════════════════════════════════════════════════════════
function calcPosition(s){
  const r={sma50pct:null,high52pct:null,sma50col:null,high52col:null,pivot:false};
  if(s.price!=null&&s.sma50!=null&&s.sma50>0){
    r.sma50pct=((s.price-s.sma50)/s.sma50)*100;
    if(r.sma50pct>=2&&r.sma50pct<=10) r.sma50col="#00e87a";
    else if(r.sma50pct>10&&r.sma50pct<=20) r.sma50col="#ffd54f";
    else r.sma50col="#ef5350";
  }
  if(s.price!=null&&s.high52w!=null&&s.high52w>0){
    r.high52pct=((s.price-s.high52w)/s.high52w)*100;
    const abs=Math.abs(r.high52pct);
    if(abs<=5) r.high52col="#00e87a";
    else if(abs<=15) r.high52col="#ffd54f";
    else r.high52col="#ef5350";
  }
  r.pivot=(r.sma50col==="#00e87a"&&r.high52col==="#00e87a");
  return r;
}

function renderPositionBar(s){
  const p=calcPosition(s);
  if(p.sma50pct===null&&p.high52pct===null) return "";
  const items=[];
  if(p.sma50pct!==null){
    const sign=p.sma50pct>=0?"+":"";
    const label=p.sma50pct>=2&&p.sma50pct<=10?"Ideal":p.sma50pct>10?"Extended":"Unter MA";
    items.push(`<div style="display:flex;align-items:center;gap:5px;flex:1;min-width:120px;
      padding:6px 9px;background:#0a0e14;border:1px solid ${p.sma50col}33;border-radius:5px">
      <div style="width:6px;height:6px;border-radius:50%;background:${p.sma50col};flex-shrink:0"></div>
      <div>
        <div style="color:#546e7a;font-size:7px;letter-spacing:1px;text-transform:uppercase">SMA 50</div>
        <div style="color:${p.sma50col};font-size:12px;font-weight:700">${sign}${p.sma50pct.toFixed(1)}%</div>
      </div>
      <div style="color:#37474f;font-size:8px;margin-left:auto">${label}</div>
    </div>`);
  }
  if(p.high52pct!==null){
    const abs=Math.abs(p.high52pct);
    const label=abs<=5?"Pivot-Nah":abs<=15?"Kontraktion":"Zu Weit";
    items.push(`<div style="display:flex;align-items:center;gap:5px;flex:1;min-width:120px;
      padding:6px 9px;background:#0a0e14;border:1px solid ${p.high52col}33;border-radius:5px">
      <div style="width:6px;height:6px;border-radius:50%;background:${p.high52col};flex-shrink:0"></div>
      <div>
        <div style="color:#546e7a;font-size:7px;letter-spacing:1px;text-transform:uppercase">52W-HOCH</div>
        <div style="color:${p.high52col};font-size:12px;font-weight:700">-${abs.toFixed(1)}%</div>
      </div>
      <div style="color:#37474f;font-size:8px;margin-left:auto">${label}</div>
    </div>`);
  }
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${items.join("")}</div>`;
}

function buildStarHistory(ticker){
  const st=U();
  const allHist=st.scans.map(sc=>{
    const idx=sc.stocks.findIndex(x=>x.t===ticker);
    const s=idx>=0?sc.stocks[idx]:null;
    return{date:sc.date,inTop10:idx>=0&&idx<10,
           s:s?{atr:s.atr,rv:s.rv,ratio:s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null),
                price:s.price,sma50:s.sma50,high52w:s.high52w}:null};
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const byDate={};allHist.forEach(h=>{byDate[h.date]=h;});
  const allDays=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
  if(allDays.length<2)return"";

  function getMarkersForWindow(window){
    if(window.length<2||!window[window.length-1].s)return null;
    const last=window[window.length-1].s;
    const validWin=window.filter(w=>w.s).map(w=>w.s);
    let count=0;
    const atrs=validWin.map(h=>h.atr).filter(Boolean);
    if(atrs.length>=2&&last.atr&&last.atr<3.5&&atrs[atrs.length-1]<atrs[0])count++;
    const rvs=validWin.map(h=>h.rv).filter(Boolean);
    if(rvs.length>=2&&last.rv&&last.rv<1.0&&rvs[rvs.length-1]<rvs[0])count++;
    const smaPct=last.price&&last.sma50&&last.sma50>0?((last.price-last.sma50)/last.sma50*100):null;
    if(smaPct!=null&&smaPct>=2&&smaPct<=12)count++;
    const h52=last.price&&last.high52w&&last.high52w>0?((last.price-last.high52w)/last.high52w*100):null;
    if(h52!=null&&h52>=-10&&h52<=0)count++;
    const rats=validWin.map(h=>h.ratio).filter(Boolean);
    if(rats.length>=2&&last.ratio&&last.ratio<1.2&&rats[rats.length-1]<rats[0])count++;
    return count;
  }

  const MAXDAYS=20;
  const showDays=allDays.slice(-MAXDAYS);
  const N=showDays.length;
  if(N<2)return"";

  const counts=showDays.map((d,idx)=>{
    const absIdx=allDays.length-N+idx;
    if(!d.s)return null; // nicht erfasst / nicht Top10
    const window=allDays.slice(Math.max(0,absIdx-2),absIdx+1);
    return getMarkersForWindow(window);
  });

  // ── Chart-Setup, gleicher Stil wie buildCharts ──
  const PL=22,PR=8,PT=8,PB=16;
  const spacing=Math.min(20,Math.max(14,(260-PL-PR)/(N-1||1)));
  const W=PL+spacing*(N-1)+PR+18;
  const H=62;

  function px(i){return PL+i*spacing;}
  function py(v){const ih=H-PT-PB;return PT+ih*(1-(v/5));} // Skala fix 0-5
  function gh(y){return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;}
  function yl(txt,y){return`<text x="${PL-3}" y="${y}" font-size="6.5" fill="#546e7a" text-anchor="end" dominant-baseline="middle" font-family="inherit">${txt}</text>`;}
  function xl(txt,x,y){return`<text x="${x}" y="${y}" font-size="6.5" fill="#37474f" text-anchor="middle" font-family="inherit">${txt}</text>`;}
  function dayStr(d){const p=d.split("-");return`${p[2]}.${p[1]}`;}

  // Gitterlinien bei 0,1,2,3,4,5
  const grid=[0,1,2,3,4,5].map(v=>gh(py(v).toFixed(1))).join("");
  const yLabels=[0,2,4,5].map(v=>yl(v,py(v).toFixed(1))).join("");

  // Verbindungslinie nur zwischen vorhandenen (nicht-null) Punkten, segmentweise
  let segments=[];let cur=[];
  counts.forEach((c,i)=>{
    if(c===null){
      if(cur.length>1)segments.push(cur);
      cur=[];
    } else {
      cur.push(`${px(i).toFixed(1)},${py(c).toFixed(1)}`);
    }
  });
  if(cur.length>1)segments.push(cur);
  const lines=segments.map(seg=>`<polyline points="${seg.join(" ")}" fill="none" stroke="#ffd54f" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>`).join("");

  // Punkte + "—" für fehlende Tage
  const dots=counts.map((c,i)=>{
    if(c===null){
      return`<text x="${px(i).toFixed(1)}" y="${py(2.5).toFixed(1)}" font-size="8" fill="#2a3a4a" text-anchor="middle" dominant-baseline="middle">–</text>`;
    }
    const col=c>=4?"#00e87a":c>=2?"#ffd54f":"#546e7a";
    return`<circle cx="${px(i).toFixed(1)}" cy="${py(c).toFixed(1)}" r="2.4" fill="${col}" stroke="rgba(0,0,0,.5)" stroke-width=".6"/>`;
  }).join("");

  const xLabels=showDays.map((d,i)=>xl(dayStr(d.date),px(i).toFixed(1),(H-PB+12))).join("");

  const lastVal=counts[counts.length-1];
  const lastTag=lastVal!==null?`<text x="${W-PR+2}" y="${py(lastVal).toFixed(1)}" font-size="7" fill="#ffd54f" font-weight="700" dominant-baseline="middle">${lastVal}★</text>`:"";

  const svgChart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
    ${grid}${yLabels}${lines}${dots}${lastTag}${xLabels}
  </svg>`;

  return`<div class="chart-section" style="margin-bottom:8px">
    <div class="chart-title" style="font-size:7px;margin-bottom:2px">MARKER-VERLAUF · ${N} TAGE (max. 5)</div>
    <div style="background:#0d1219;border:1px solid #1e2836;border-radius:3px;padding:4px 2px 1px;overflow-x:auto;-webkit-overflow-scrolling:touch">${svgChart}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;padding:0 2px">
      <span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#546e7a"><span style="width:6px;height:6px;background:#00e87a;border-radius:50%;display:inline-block"></span>4–5 Marker</span>
      <span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#546e7a"><span style="width:6px;height:6px;background:#ffd54f;border-radius:50%;display:inline-block"></span>2–3 Marker</span>
      <span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#546e7a"><span style="width:6px;height:6px;background:#546e7a;border-radius:50%;display:inline-block"></span>0–1 Marker</span>
      <span style="color:#2a3a4a;font-size:8px">— nicht in Top 10</span>
    </div>
  </div>`;
}

// ── WATCHLIST ──
function calcMarkers(ticker){
  const st=U();
  const allHist=st.scans.map(sc=>{
    const s=sc.stocks.find(x=>x.t===ticker);
    if(!s)return null;
    return{date:sc.date,atr:s.atr,rv:s.rv,
           ratio:s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null),
           price:s.price,sma50:s.sma50,high52w:s.high52w};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
  const byDate={};allHist.forEach(h=>{byDate[h.date]=h;});
  const hist=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
  if(hist.length<2)return null;

  function getMarkersForWindow(window){
    if(window.length<2)return{markers:[],details:{}};
    const last=window[window.length-1];
    const markers=[];const details={};
    const atrs=window.map(h=>h.atr).filter(Boolean);
    if(atrs.length>=2&&last.atr&&last.atr<3.5&&atrs[atrs.length-1]<atrs[0])
      {markers.push("ATR↓");details["ATR↓"]=`${atrs[0].toFixed(1)}→${atrs[atrs.length-1].toFixed(1)}%`;}
    const rvs=window.map(h=>h.rv).filter(Boolean);
    if(rvs.length>=2&&last.rv&&last.rv<1.0&&rvs[rvs.length-1]<rvs[0])
      {markers.push("RV↓");details["RV↓"]=`${rvs[0].toFixed(2)}→${rvs[rvs.length-1].toFixed(2)}`;}
    const smaPct=last.price&&last.sma50&&last.sma50>0?((last.price-last.sma50)/last.sma50*100):null;
    if(smaPct!=null&&smaPct>=2&&smaPct<=12)
      {markers.push("SMA✓");details["SMA✓"]=`+${smaPct.toFixed(1)}%`;}
    const h52=last.price&&last.high52w&&last.high52w>0?((last.price-last.high52w)/last.high52w*100):null;
    if(h52!=null&&h52>=-10&&h52<=0)
      {markers.push("52W✓");details["52W✓"]=`${h52.toFixed(1)}%`;}
    const rats=window.map(h=>h.ratio).filter(Boolean);
    if(rats.length>=2&&last.ratio&&last.ratio<1.2&&rats[rats.length-1]<rats[0])
      {markers.push("RAT↓");details["RAT↓"]=`${rats[0].toFixed(2)}→${rats[rats.length-1].toFixed(2)}`;}
    return{markers,details};
  }

  // 5-Tage-Verlauf: für jeden der letzten 5 Tage Marker berechnen
  const N=hist.length;
  const days=Math.min(5,N);
  const dailyCounts=[];
  for(let i=0;i<days;i++){
    const dayIdx=N-days+i;
    // Fenster: 3 Tage endend an diesem Tag
    const window=hist.slice(Math.max(0,dayIdx-2),dayIdx+1);
    const r=getMarkersForWindow(window);
    dailyCounts.push({date:hist[dayIdx].date,count:r.markers.length});
  }

  // Heute
  const today=getMarkersForWindow(hist.slice(-3));
  // Gestern
  const prev=N>=4?getMarkersForWindow(hist.slice(-4,-1)):null;
  const delta=prev?today.markers.length-prev.markers.length:null;

  // Trend über 5 Tage: steigend/fallend/stabil
  const counts=dailyCounts.map(d=>d.count);
  let trend="→";
  if(counts.length>=3){
    const first=counts.slice(0,Math.ceil(counts.length/2));
    const last2=counts.slice(-Math.ceil(counts.length/2));
    const avgFirst=first.reduce((a,b)=>a+b,0)/first.length;
    const avgLast=last2.reduce((a,b)=>a+b,0)/last2.length;
    if(avgLast>avgFirst+0.4) trend="▲";
    else if(avgLast<avgFirst-0.4) trend="▼";
  }

  return{
    ticker,
    markers:today.markers,
    details:today.details,
    count:today.markers.length,
    prevCount:prev?prev.markers.length:null,
    delta,
    dailyCounts,
    trend
  };
}

function renderWatch(){
  const el=document.getElementById("tab3");

  results.sort((a,b)=>b.count-a.count||a.ticker.localeCompare(b.ticker));
  const acol=uni==="hard"?"#ffd54f":"#00e87a";
  const mcols={"ATR↓":"#29b6f6","RV↓":"#00e87a","SMA✓":"#ce93d8","52W✓":"#ffd54f","RAT↓":"#ffb74d"};

    }).join("");

    // Trend-Pfeil
    const trendCol=r.trend==="▲"?"#00e87a":r.trend==="▼"?"#ef5350":"#37474f";
    const deltaStr=r.delta!==null?(r.delta>0?`+${r.delta}`:r.delta<0?`${r.delta}`:"="):"";
    const deltaCol=r.delta>0?"#00e87a":r.delta<0?"#ef5350":"#37474f";

    return`<div style="padding:10px 0;border-bottom:1px solid #1e2836">

        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          ${r.delta!==null?`<span style="color:${deltaCol};font-size:10px;font-weight:700">${deltaStr}</span>`:""}
          <span style="color:${trendCol};font-size:13px;font-weight:700">${r.trend}</span>
        </div>
      </div>

        ${sparkline}
        <span style="color:#37474f;font-size:7px;margin-left:2px;align-self:center">5T</span>
      </div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${chips}</div>
    </div>`;
  }).join("");

  el.innerHTML=`<div style="padding:12px">
    <div style="color:${acol};font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:3px">👁 BEOBACHTUNGSLISTE — ${uni.toUpperCase()}</div>
    <div style="color:#37474f;font-size:9px;margin-bottom:10px">≥2 aktive Marker (3-Tage-Fenster) · Trend über 5 Tage</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;padding:7px 9px;background:#0d1219;border:1px solid #1e2836;border-radius:5px">
      ${Object.entries(mcols).map(([m,col])=>`<span style="color:${col};font-size:8px">● ${m}</span>`).join("  ")}
    </div>
    ${rows||`<div style="color:#546e7a;font-size:11px;text-align:center;padding:30px">Keine Kandidaten.</div>`}
    <div style="margin-top:10px;color:#2a3a4a;font-size:8px;line-height:1.9">
      ATR↓ Range schrumpft &lt;3.5% · RV↓ Volumen trocknet aus · SMA✓ Ideal 2–12% über MA<br>
      52W✓ ≤10% unter Jahreshoch · RAT↓ Vola-Ratio kontrahiert
    </div>
  </div>`;
}

function confirmDel(id){
  const btn=document.getElementById("del-"+id);if(!btn)return;
  if(btn.dataset.armed==="1"){delScan(id);}
  else{btn.dataset.armed="1";btn.textContent="SICHER?";btn.style.background="rgba(255,68,68,.2)";
    setTimeout(()=>{if(btn&&btn.dataset.armed==="1"){btn.dataset.armed="0";btn.textContent="LÖSCHEN";btn.style.background="";}},3000);}
}
function delScan(id){U().scans=U().scans.filter(s=>s.id!==id);saveU();U().sel=Math.max(0,Math.min(U().sel,U().scans.length-1));render();}
